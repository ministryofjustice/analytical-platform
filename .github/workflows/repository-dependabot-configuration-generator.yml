---
name: Dependabot Configuration Generator

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  dependabot-configuration-generator:
    name: Dependabot Configuration Generator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Dependabot Configuration Generator
        id: run_dependabot_configuration_generator
        run: |
          bash scripts/dependabot/configuration-generator.sh

      - name: Detect Changes in .github/dependabot.yml
        id: detect_changes
        run: |
          if git diff --quiet --exit-code .github/dependabot.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Changes
        id: commit_changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          path=".github/dependabot.yml"
          contents="$(base64 -w 0 "${path}")"

          existing_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${branch}" \
              --jq '.sha' 2>/dev/null || echo ""
          )"

          if [ -n "${existing_sha}" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="🤖 Update .github/dependabot.yml" \
              -f content="${contents}" \
              -f branch="${branch}" \
              -f sha="${existing_sha}"
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="🤖 Update .github/dependabot.yml" \
              -f content="${contents}" \
              -f branch="${branch}"
          fi
        env:
          GH_TOKEN: ${{ secrets.AP_DEPENDABOT_COMMIT_TOKEN }}
