---
name: Dependabot Configuration Generator

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  dependabot-configuration-generator:
    name: Dependabot Configuration Generator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Dependabot Configuration Generator
        id: run_dependabot_configuration_generator
        run: |
          bash scripts/dependabot/configuration-generator.sh

      - name: Detect Changes in .github/dependabot.yml
        id: detect_changes
        run: |
          if git diff --quiet --exit-code .github/dependabot.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Changes
        id: commit_changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          path=".github/dependabot.yml"

          expected_head_oid="$(
            gh api graphql \
              -f owner="${GITHUB_REPOSITORY%/*}" \
              -f name="${GITHUB_REPOSITORY#*/}" \
              -f qualifiedName="refs/heads/${branch}" \
              -f query='query($owner: String!, $name: String!, $qualifiedName: String!) {
                repository(owner: $owner, name: $name) {
                  ref(qualifiedName: $qualifiedName) {
                    target {
                      ... on Commit {
                        oid
                      }
                    }
                  }
                }
              }' \
              --jq '.data.repository.ref.target.oid'
          )"

          contents="$(base64 -w 0 "${path}")"

          gh api graphql \
            -f repo="${GITHUB_REPOSITORY}" \
            -f branch="${branch}" \
            -f expectedHeadOid="${expected_head_oid}" \
            -f path="${path}" \
            -f contents="${contents}" \
            -f query='mutation(
              $repo: String!,
              $branch: String!,
              $expectedHeadOid: GitObjectID!,
              $path: String!,
              $contents: Base64String!
            ) {
              createCommitOnBranch(
                input: {
                  branch: {
                    repositoryNameWithOwner: $repo
                    branchName: $branch
                  }
                  message: {
                    headline: "🤖 Update .github/dependabot.yml"
                  }
                  expectedHeadOid: $expectedHeadOid
                  fileChanges: {
                    additions: [{path: $path, contents: $contents}]
                  }
                }
              ) {
                commit {
                  oid
                  url
                }
              }
            }'
        env:
          GH_TOKEN: ${{ secrets.AP_DEPENDABOT_COMMIT_TOKEN }}
