---
name: Test - Dependabot Commit Changes

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  test-commit-changes:
    name: Test Commit Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create Test Change
        id: create_test_change
        run: |
          date -u > .github/.test-commit-changes-marker.txt

      - name: Commit Test Change (REST API)
        id: commit_test_change
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          path=".github/.test-commit-changes-marker.txt"
          contents="$(base64 -w 0 "${path}")"

          existing_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${branch}" \
              --jq '.sha' 2>/dev/null || echo ""
          )"

          if [ -n "${existing_sha}" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="🧪 Test commit changes mechanism" \
              -f content="${contents}" \
              -f branch="${branch}" \
              -f sha="${existing_sha}"
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="🧪 Test commit changes mechanism" \
              -f content="${contents}" \
              -f branch="${branch}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
