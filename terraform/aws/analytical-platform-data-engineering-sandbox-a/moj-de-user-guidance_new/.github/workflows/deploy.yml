name: Build and Deploy to Cloud Platform

on:
  push:
    branches:
      - dev
    paths:
      - 'data_engg_support_assistant/**'
      - '.github/workflows/deploy.yml'

env:
  APP_DIR: data_engg_support_assistant

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read  

    steps:
      - name: Checkout code # Step 1: Get the code from repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials # Step 2: Authenticate to AWS using OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR # Step 3: Get ECR login credentials
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Debug ECR values # Step 4: Verify ECR configuration values
        run: |
          echo "ECR_REGISTRY_URL: ${ECR_REGISTRY_URL}"
          echo "ECR_REPOSITORY: ${ECR_REPOSITORY}"
          echo "Full path: ${ECR_REGISTRY_URL}/${ECR_REPOSITORY}"
        env:
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

      - name: Build, tag, and push image to Amazon ECR # Step 5: Build Docker image and push to ECR
        working-directory: ${{ env.APP_DIR }}
        env:
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${ECR_REGISTRY_URL}/${ECR_REPOSITORY}:${IMAGE_TAG} .
          docker push ${ECR_REGISTRY_URL}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker tag ${ECR_REGISTRY_URL}/${ECR_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY_URL}/${ECR_REPOSITORY}:latest
          docker push ${ECR_REGISTRY_URL}/${ECR_REPOSITORY}:latest
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Install envsubst # Step 6: Install tool for environment variable substitution in templates
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
      
      - name: Authenticate to Kubernetes # Step 7: Configure kubectl to connect to Cloud Platform cluster (MUST be before any kubectl commands)
        env:
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        run: |
          echo "${KUBE_CERT}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} \
            --certificate-authority=./ca.crt \
            --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user \
            --token=${KUBE_TOKEN}
          kubectl config set-context ${KUBE_CLUSTER} \
            --cluster=${KUBE_CLUSTER} \
            --user=deploy-user \
            --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}
          echo "✅ Kubernetes authentication complete"
      
      - name: Check BEARER_TOKEN exists # Step 8: Verify GitHub secret has a value before using it
        run: |
          if [ -z "${{ secrets.BEARER_TOKEN }}" ]; then
            echo "❌ BEARER_TOKEN is empty!"
            exit 1
          else
            echo "✅ BEARER_TOKEN is set"
          fi
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}

      - name: Create and verify bearer token secret
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
        run: |
          echo "=== Creating secret ==="
          kubectl delete secret api-bearer-token -n ${KUBE_NAMESPACE} --ignore-not-found=true
          kubectl create secret generic api-bearer-token \
            --from-literal=token="${BEARER_TOKEN}" \
            -n ${KUBE_NAMESPACE}
          
          echo "=== Verifying secret ==="
          # Wait and verify secret is fully available
          for i in {1..10}; do
            if kubectl get secret api-bearer-token -n ${KUBE_NAMESPACE} -o jsonpath='{.data.token}' | base64 -d > /dev/null 2>&1; then
              echo "✅ Secret created and verified (attempt $i)"
              sleep 5  # Extra buffer for propagation
              break
            fi
            echo "⏳ Waiting for secret availability (attempt $i/10)..."
            sleep 3
          done
          
          # Final verification
          kubectl get secret api-bearer-token -n ${KUBE_NAMESPACE}
          echo "✅ Secret is ready"
          
      - name: Generate Kubernetes manifests # Step 9: Replace environment variables in template files to create final manifests
        working-directory: ${{ env.APP_DIR }}
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}/${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mkdir -p manifests

          echo "=== Generating manifests ==="
          for file in k8s/templates/*.yml; do
            envsubst < "$file" > "manifests/$(basename $file)"
          done

          echo "=== Validating manifests ==="
          # Check for unsubstituted variables
          if grep -r '\${' manifests/; then
            echo "❌ Found unsubstituted variables!"
            exit 1
          fi
          
          echo "✅ Manifests generated successfully:"
          ls -la manifests/
          
          echo ""
          echo "=== Manifest contents ==="
          cat manifests/*.yml

      - name: Clean up old deployments # Step 10: Delete existing deployment to ensure fresh start
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo "Checking for existing deployment..."
          if kubectl get deployment data-engg-support-assistant -n ${KUBE_NAMESPACE} 2>/dev/null; then
            echo "Deleting existing deployment to force fresh start..."
            kubectl delete deployment data-engg-support-assistant -n ${KUBE_NAMESPACE} --wait=true
            echo "Waiting for pods to terminate..."
            kubectl wait --for=delete pod -l app=data-engg-support-assistant -n ${KUBE_NAMESPACE} --timeout=60s || true
            echo "✅ Old deployment cleaned up"
          else
            echo "No existing deployment found"
          fi
      
      - name: Apply Kubernetes manifests # Step 11: Deploy all K8s resources (deployment, service, ingress)
        working-directory: ${{ env.APP_DIR }}
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo "=== Applying manifests in order ==="
          
          # 1. Apply in dependency order
          kubectl apply -f manifests/service.yml -n ${KUBE_NAMESPACE}
          echo "✅ Service applied"
          
          # 2. Deployment (depends on secret and service)
          kubectl apply -f manifests/deployment.yml -n ${KUBE_NAMESPACE}
          echo "✅ Deployment applied"
          
          # 3. Ingress last (depends on service)
          kubectl apply -f manifests/ingress.yml -n ${KUBE_NAMESPACE}
          echo "✅ Ingress applied"

          # Brief wait for pods to start creating
          sleep 10
      
      - name: Debug deployment status
        if: always()
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo "=== Secret Status ==="
          kubectl get secret api-bearer-token -n ${KUBE_NAMESPACE}
          
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ${KUBE_NAMESPACE} -l app=data-engg-support-assistant -o wide
          
          echo ""
          echo "=== Recent Pod Events ==="
          kubectl describe pods -l app=data-engg-support-assistant -n ${KUBE_NAMESPACE} | grep -A 20 "Events:" || echo "No events yet"
   
      - name: Wait for deployment rollout # Step 12: Wait for deployment to complete and gather debug info if it fails
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo "=== Starting deployment rollout ==="
    
          # Start rollout status in background
          kubectl rollout status deployment/data-engg-support-assistant -n ${KUBE_NAMESPACE} --timeout=10m &
          ROLLOUT_PID=$!
          
          # Monitor pods while waiting
          for i in {1..60}; do
            if ! kill -0 $ROLLOUT_PID 2>/dev/null; then
              break
            fi
            
            echo ""
            echo "=== Check $i/60 ==="
            kubectl get pods -n ${KUBE_NAMESPACE} -l app=data-engg-support-assistant --no-headers
            sleep 10
          done
          
          # Wait for rollout to complete
          if wait $ROLLOUT_PID; then
            echo "✅ Rollout completed successfully!"
            exit 0
          else
            echo "❌ Rollout failed! Gathering debug information..."
            echo ""
            echo "=== POD STATUS ==="
            kubectl get pods -n ${KUBE_NAMESPACE} -l app=data-engg-support-assistant -o wide
            echo ""
            echo "=== POD DESCRIPTIONS ==="
            kubectl describe pods -n ${KUBE_NAMESPACE} -l app=data-engg-support-assistant
            echo ""
            echo "=== POD LOGS ==="
            for pod in $(kubectl get pods -n ${KUBE_NAMESPACE} -l app=data-engg-support-assistant -o jsonpath='{.items[*].metadata.name}'); do
              echo "--- Logs from $pod ---"
              kubectl logs -n ${KUBE_NAMESPACE} $pod --tail=200 --all-containers=true || echo "Failed to get logs from $pod"
              echo ""
            done
            exit 1
          fi
          
      - name: Verify deployment # Step 13: Display final deployment status and application URL
        if: success()
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo " Deployment successful!"
          echo ""
          echo "=== PODS ==="
          kubectl get pods -n ${KUBE_NAMESPACE} -l app=data-engg-support-assistant -o wide
          echo ""
          echo "=== SERVICES ==="
          kubectl get svc -n ${KUBE_NAMESPACE}
          echo ""
          echo "=== INGRESS ==="
          kubectl get ingress -n ${KUBE_NAMESPACE}
          echo ""
          echo "=== APPLICATION URL ==="
          echo "https://${KUBE_NAMESPACE}.apps.live.cloud-platform.service.justice.gov.uk"

