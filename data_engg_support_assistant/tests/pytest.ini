# pytest.ini (project root)
[pytest]
# Ensure project root is on PYTHONPATH
pythonpath = .

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Markers (should match conftest.py)
markers =
    unit: Unit tests (fully mocked, fast)
    smoke: Smoke tests (quick sanity checks)
    integration: Integration tests (detailed validation)
    end2end: End-to-end tests with real AWS (expensive, requires --run-end2end flag)
    slow: Slow tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:warnings
    -m "not end2end"

# Logging
log_cli = false
log_cli_level = INFO


