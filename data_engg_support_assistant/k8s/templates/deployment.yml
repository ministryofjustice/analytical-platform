apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-engg-support-assistant
  namespace: ${KUBE_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-engg-support-assistant
  template:
    metadata:
      labels:
        app: data-engg-support-assistant
    spec:
      containers:
      - name: streamlit
        image: ${ECR_URL}:${IMAGE_TAG}
        ports:
        - containerPort: 8501
        env:
        - name: API_GATEWAY_URL
          value: "https://d1iuduqmg4.execute-api.eu-west-2.amazonaws.com/prod"
        - name: BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-bearer-token
              key: token
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
